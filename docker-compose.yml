services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kb
      POSTGRES_USER: kb
      POSTGRES_PASSWORD: kb
    ports:
      - "5434:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb -d kb"]
      interval: 3s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: kb-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    # Qdrant's image is distroless-ish (no bash/curl/wget). We rely on
    # service_started + app-side retries instead of a container healthcheck.

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: kb-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kbminio
      MINIO_ROOT_PASSWORD: kbminio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: kb-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 kbminio kbminio-secret &&
      mc mb --ignore-existing local/kb-bucket &&
      echo 'minio bucket ready'
      "
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: kb-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    command:
      - sh
      - -c
      - "python -m kb.cli db init && uvicorn kb.api.app:app --host 0.0.0.0 --port 8000 --loop uvloop --http httptools"

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: kb-worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    env_file: .env
    volumes:
      - ./data:/data
    command: ["python", "-m", "kb.jobs.worker"]

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: kb-streamlit
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    environment:
      KB_API_URL: http://api:8000
      PYTHONPATH: /app:/app/src
    ports:
      - "8501:8501"
    command:
      [
        "streamlit",
        "run",
        "streamlit_app/app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
        "--server.headless=true",
      ]
