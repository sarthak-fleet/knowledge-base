# Overrides for the SEC demo. Anything not listed is inherited from defaults.yaml.
parse:
  default_strategy: auto       # 10-K/Q are usually digital PDFs; OCR kicks in only when needed
  hi_res_pages_max: 400        # 10-Ks can be 300+ pages

extract:
  window_pages: 12             # filings have long sections; bigger windows reduce LLM calls
  window_overlap_pages: 2

retrieve:
  top_k_dense: 25              # large corpora — surface more candidates before fusion
  top_k_sparse: 25
  rerank_top_k: 10
  hybrid_alpha: 0.55           # lean slightly more on dense for financial language

synthesize:
  excerpt_chars: 600           # SEC sentences are long; keep more excerpt text in citations

graph_route:
  default_entity_type: RiskFactor  # theme questions default to RiskFactor entities

duckdb_route:
  filename_to_field:
    pattern: '^([A-Z]{1,5})[_-]'   # SEC filings name themselves TICKER_FORM_DATE_*.html
    field: ticker                  # backfill the ticker field on entities where extraction missed it

xlsx_bridge:
  enabled: true
  target_entity_type: FinancialMetric
  ident_field: ticker
  ident_columns: [ticker, symbol, company, issuer]
  value_columns:
    - revenue
    - net income
    - income
    - eps
    - eps diluted
    - eps-diluted
    - gross profit
    - operating income
    - cash
    - total assets
  period_columns: [period, quarter, fiscal year, year, date]
  name_columns: [name, metric, indicator]

intent:
  few_shot_examples: |
    Examples of correct classification:

    Q: "What does Apple disclose about supply chain risks?"
    → {"kind": "lookup", "entity_type": "RiskFactor", "filters": {"ticker": "AAPL"}, "reason": "Single fact lookup for a named company."}

    Q: "Which companies had quarterly revenue exceeding $60 billion?"
    → {"kind": "aggregate", "entity_type": "FinancialMetric", "filters": {"name": "Revenue"}, "reason": "Aggregation over multiple entities with numeric threshold."}

    Q: "Compare NVIDIA's Q1 and Q2 2024 EPS-Diluted."
    → {"kind": "compare", "entity_type": "FinancialMetric", "filters": {"ticker": "NVDA"}, "reason": "Side-by-side comparison of named items."}

    Q: "What is Microsoft's largest revenue segment?"
    → {"kind": "negative", "entity_type": null, "filters": {"ticker": "MSFT"}, "reason": "Microsoft is unlikely to be in this corpus."}

    Q: "What is Apple's highest quarterly revenue in the summary financials?"
    → {"kind": "aggregate", "entity_type": "FinancialMetric", "filters": {"name": "Revenue", "ticker": "AAPL"}, "reason": "Superlative (highest) requires scanning multiple entries — aggregate."}
