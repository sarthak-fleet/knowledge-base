# Overrides for the legal-contracts demo. Inherits from defaults.yaml.
parse:
  default_strategy: fast        # license texts are simple — no OCR/layout needed

extract:
  window_pages: 6               # licenses are short; smaller windows = tighter extraction
  window_overlap_pages: 1

retrieve:
  rerank_top_k: 6               # fewer chunks per answer; legal questions are usually focused
  hybrid_alpha: 0.45            # lean slightly more on lexical — legal language is term-heavy
  mmr_enabled: true             # licenses repeat boilerplate across files; MMR diversity
                                # raises citation F1 from 0.75 → 0.83 in eval.
  mmr_lambda: 0.7

graph_route:
  default_entity_type: Clause   # theme questions on legal default to Clause entities
