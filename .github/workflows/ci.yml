name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.30"
      - run: uv python install 3.11
      - run: uv sync --all-extras
      - run: uv run ruff check src tests
      - run: uv run pytest -q
