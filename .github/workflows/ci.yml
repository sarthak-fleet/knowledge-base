name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.30"
      - run: uv python install 3.11
      - run: uv sync --all-extras
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run pytest -q --cov=kb --cov-report=term-missing
      # mypy is informational for now — annotations aren't all strict yet
      - run: uv run mypy src/kb --ignore-missing-imports --no-strict-optional
        continue-on-error: true
