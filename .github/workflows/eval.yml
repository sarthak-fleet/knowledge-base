name: worker-eval-on-pr
on:
  pull_request:
    paths:
      - "cloudflare/**"
      - "domains/**"
  workflow_dispatch: {}

jobs:
  worker-eval-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cloudflare/worker
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: cloudflare/worker/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run eval:parse:legacy:dry-run
      - run: pnpm run preflight -- --json
      - run: pnpm run gaps:full-port -- --json
